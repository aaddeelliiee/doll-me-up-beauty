# Netlify settings for this static site.
# dollmeupbeauty.com should be the primary domain in Netlify's Domain Management.

[[redirects]]
  from = "https://dollmeup.beauty/*"
  to = "https://dollmeupbeauty.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.dollmeup.beauty/*"
  to = "https://dollmeupbeauty.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.dollmeupbeauty.com/*"
  to = "https://dollmeupbeauty.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
